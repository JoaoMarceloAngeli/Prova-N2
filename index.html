    }

    function JmCursosPage({ sub, setSub, courses, planos, trilhas, currentUser, subscriptions, onSelectPlan }) {
      const TABS = ["Trilhas","Cursos","Meu Plano","Certificados"];
      const [playing, setPlaying] = useState(null);

      // ── progresso ────────────────────────────────────────────────────────────
      const watchedKey = "jm_watched_" + (currentUser?.id || "anon");
      const [watched, setWatched] = useState(() => {
        try { return JSON.parse(localStorage.getItem(watchedKey) || "[]"); } catch { return []; }
      });
      function markWatched(id) {
        if (watched.includes(id)) return;
        const n = [...watched, id];
        setWatched(n);
        localStorage.setItem(watchedKey, JSON.stringify(n));
      }
      function isCourseComplete(c) { return !c.videoUrl || watched.includes(c.id); }
      function isTrailComplete(t) {
        const tc = courses.filter(c => (t.courseIds||[]).includes(c.id));
        return tc.length > 0 && tc.every(c => isCourseComplete(c));
      }

      // ── certificados solicitados ─────────────────────────────────────────────
      const issuedKey = "jm_issued_" + (currentUser?.id || "anon");
      const [issued, setIssued] = useState(() => {
        try { return JSON.parse(localStorage.getItem(issuedKey) || "[]"); } catch { return []; }
      });
      function requestCert(id) {
        if (issued.some(c => c.id === id)) return;
        const n = [...issued, { id, issuedAt: new Date().toLocaleDateString("pt-BR") }];
        setIssued(n);
        localStorage.setItem(issuedKey, JSON.stringify(n));
      }

      return (
        <div>
          <h2 className="fw-bold mb-4" style={{color:"var(--jm-navy)"}}>JM Cursos</h2>
          <ul className="nav nav-tabs mb-4">
            {TABS.map(t => (
              <li className="nav-item" key={t}>
                <button className={"nav-link" + (sub===t ? " active":"")} onClick={() => { setSub(t); setPlaying(null); }}>{t}</button>
              </li>
            ))}
          </ul>

          {sub === "Cursos" && (
            courses.length === 0
              ? <p className="text-muted">Nenhum curso disponível. O administrador ainda não cadastrou cursos.</p>
              : <div className="row g-3">
                  {courses.map(c => (
                    <div className="col-12 col-md-6 col-lg-4" key={c.id}>
                      <div className="course-card">
                        <div className="course-thumb" style={{position:"relative"}}>
                          <i className="bi bi-play-circle-fill" />
                          {watched.includes(c.id) && (
                            <span style={{position:"absolute",top:8,right:8,background:"#0d7a55",color:"#fff",borderRadius:20,padding:"2px 8px",fontSize:".72rem",fontWeight:700,display:"flex",alignItems:"center",gap:3}}>
                              <i className="bi bi-check-circle-fill" style={{fontSize:".7rem"}} />Concluído
                            </span>
                          )}
                        </div>
                        <div className="p-3">
                          <div className="fw-bold mb-1" style={{color:"var(--jm-navy)"}}>{c.name}</div>
                          {c.description && <p className="text-muted mb-2" style={{fontSize:".83rem"}}>{c.description}</p>}
                          <div className="d-flex flex-wrap gap-2 mb-2">
                            {c.workload && (
                              <span style={{background:"#f0f4ff",color:"var(--jm-mid)",borderRadius:20,padding:"2px 9px",fontSize:".76rem",display:"inline-flex",alignItems:"center",gap:4}}>
                                <i className="bi bi-clock" style={{fontSize:".72rem"}} />{c.workload}
                              </span>
                            )}
                            {c.videoUrl && (
                              <span style={{background:"#e8f6f0",color:"#0d7a55",borderRadius:20,padding:"2px 9px",fontSize:".76rem",display:"inline-flex",alignItems:"center",gap:4}}>
                                <i className="bi bi-play-circle" style={{fontSize:".72rem"}} />Com vídeo
                              </span>
                            )}
                          </div>
                          {c.videoUrl && (
                            <button className="btn btn-sm w-100 fw-semibold"
                              style={{background:watched.includes(c.id)?"#e8f0fe":"var(--jm-grad)",color:watched.includes(c.id)?"var(--jm-mid)":"#fff",border:watched.includes(c.id)?"1px solid #d0dcf5":"none",borderRadius:8}}
                              onClick={() => { const n=playing===c.id?null:c.id; setPlaying(n); if(n) markWatched(c.id); }}>
                              <i className={"bi bi-" + (playing===c.id?"chevron-up":watched.includes(c.id)?"play-circle":"play-fill") + " me-1"} />
                              {playing===c.id ? "Fechar" : watched.includes(c.id) ? "Assistir novamente" : "Assistir"}
                            </button>
                          )}
                          {playing === c.id && c.videoUrl && (
                            <div className="mt-2 rounded-3 overflow-hidden">
                              <div style={{position:"relative",paddingTop:"56.25%",background:"#000"}}>
                                <iframe src={toEmbed(c.videoUrl)} allowFullScreen
                                  style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}} />
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
          )}

          {sub === "Meu Plano" && (() => {
            const activeSub = subscriptions.find(s => s.userId === currentUser?.id && s.status === "ativo");
            const currentPlan = activeSub ? planos.find(p => p.id === activeSub.planId) : null;
            return (
              <div>
                {currentPlan && activeSub ? (
                  <div className="mb-4">
                    <h6 className="fw-semibold mb-3 d-flex align-items-center gap-2" style={{color:"var(--jm-navy)"}}>
                      <i className="bi bi-check-circle-fill" style={{color:"#0d7a55"}} />Seu plano atual
                      <span className="text-muted fw-normal" style={{fontSize:".82rem"}}>· desde {activeSub.startDate}</span>
                    </h6>
                    <div className="row g-4">
                      <div className="col-12 col-sm-6 col-md-4">
                        <div style={{background:"#fff",borderRadius:14,border:"2px solid var(--jm-blue)",padding:"1.5rem",display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",boxShadow:"0 6px 24px rgba(21,101,192,.15)"}}>
                          <span className="badge mb-2 px-3" style={{background:"#e8f0fe",color:"var(--jm-mid)",borderRadius:20,fontSize:".82rem"}}>{currentPlan.period}</span>
                          <div className="fw-bold fs-5 mb-1" style={{color:"var(--jm-navy)"}}>{currentPlan.name}</div>
                          <div className="fw-bold my-3" style={{fontSize:"2rem",color:"var(--jm-blue)",lineHeight:1}}>
                            {currentPlan.price}<span style={{fontSize:".85rem",fontWeight:400,color:"#888"}}>/{currentPlan.period}</span>
                          </div>
                          <ul className="list-unstyled w-100 mb-4" style={{textAlign:"left"}}>
                            {currentPlan.features.map((f,j) => (
                              <li key={j} className="d-flex align-items-center gap-2 mb-2">
                                <i className="bi bi-check-circle-fill" style={{color:"#0d7a55",flexShrink:0,fontSize:".85rem"}} />
                                <span style={{fontSize:".87rem"}}>{f}</span>
                              </li>
                            ))}
                          </ul>
                          <button disabled style={{background:"#e8f0fe",color:"var(--jm-mid)",border:"none",borderRadius:9,padding:".62rem 1.5rem",fontWeight:700,cursor:"default",width:"100%",fontSize:".92rem",fontFamily:"inherit",opacity:.85}}>
                            ✓ Plano atual
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="adm-info-banner mb-4">
                    <i className="bi bi-info-circle-fill me-2" />Você ainda não possui um plano ativo.
                  </div>
                )}

                <h6 className="fw-semibold text-muted mb-3">{currentPlan ? "Trocar de plano" : "Escolher um plano"}</h6>
                {planos.length === 0 ? (
                  <p className="text-muted">Nenhum plano disponível no momento.</p>
                ) : (
                  <div className="row g-4">
                    {planos.map((p,i) => {
                      const isCurrent = currentPlan?.id === p.id;
                      return (
                        <div key={p.id} className="col-12 col-sm-6 col-md-4">
                          <div style={{background:"#fff",borderRadius:14,border:isCurrent?"2px solid var(--jm-blue)":"2px solid #e3e8f0",padding:"1.5rem",display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",boxShadow:isCurrent?"0 6px 24px rgba(21,101,192,.15)":"0 2px 10px rgba(0,0,0,.04)",transition:"border-color .2s,box-shadow .2s"}}>
                            <span className="badge mb-2 px-3" style={{background:"#e8f0fe",color:"var(--jm-mid)",borderRadius:20,fontSize:".82rem"}}>{p.period}</span>
                            <div className="fw-bold fs-5 mb-1" style={{color:"var(--jm-navy)"}}>{p.name}</div>
                            <div className="fw-bold my-3" style={{fontSize:"2rem",color:"var(--jm-blue)",lineHeight:1}}>
                              {p.price}<span style={{fontSize:".85rem",fontWeight:400,color:"#888"}}>/{p.period}</span>
                            </div>
                            <ul className="list-unstyled w-100 mb-4" style={{textAlign:"left"}}>
                              {p.features.map((f,j) => (
                                <li key={j} className="d-flex align-items-center gap-2 mb-2">
                                  <i className="bi bi-check-circle-fill" style={{color:"#0d7a55",flexShrink:0,fontSize:".85rem"}} />
                                  <span style={{fontSize:".87rem"}}>{f}</span>
                                </li>
                              ))}
                            </ul>
                            <button disabled={isCurrent}
                              style={{background:isCurrent?"#e8f0fe":i===0?"var(--jm-grad)":"#f0f4ff",color:isCurrent?"var(--jm-mid)":i===0?"#fff":"var(--jm-mid)",border:isCurrent||i===0?"none":"1px solid #d0dcf5",borderRadius:9,padding:".62rem 1.5rem",fontWeight:700,cursor:isCurrent?"default":"pointer",width:"100%",fontSize:".92rem",fontFamily:"inherit",opacity:isCurrent?.85:1}}
                              onClick={() => { if (!isCurrent) onSelectPlan(p); }}>
                              {isCurrent ? "✓ Plano atual" : "Selecionar"}
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })()}

          {sub === "Trilhas" && (
            trilhas.length === 0
              ? <p className="text-muted">Nenhuma trilha disponível ainda.</p>
              : <div className="row g-3">
                  {trilhas.map(t => {
                    const lvlColor = {"Iniciante":"#0d7a55","Intermediário":"#c07000","Avançado":"#c0392b"};
                    const lvlBg    = {"Iniciante":"#e8f6f0","Intermediário":"#fff8e6","Avançado":"#fff0f0"};
                    const tCourses = courses.filter(c => (t.courseIds||[]).includes(c.id));
                    const tHours   = tCourses.reduce((s,c)=>s+(parseInt(c.workload)||0),0);
                    return (
                      <div className="col-12 col-md-6 col-lg-4" key={t.id}>
                        <div className="bg-white rounded-3 h-100" style={{border:"1px solid #e3e8f0",boxShadow:"0 2px 10px rgba(0,0,0,.05)",overflow:"hidden"}}>
                          <div style={{height:8,background:"var(--jm-grad)"}} />
                          <div className="p-4">
                            <div className="d-flex flex-wrap gap-1 mb-2">
                              {t.level && <span className="badge rounded-pill" style={{background:lvlBg[t.level],color:lvlColor[t.level],fontSize:".72rem"}}>{t.level}</span>}
                              {t.area  && <span className="badge rounded-pill" style={{background:"#f0f4ff",color:"var(--jm-mid)",fontSize:".72rem"}}>{t.area}</span>}
                            </div>
                            <div className="fw-bold mb-1" style={{color:"var(--jm-navy)",fontSize:"1rem"}}>{t.name}</div>
                            {t.description && <p className="text-muted mb-2" style={{fontSize:".83rem"}}>{t.description}</p>}
                            {t.goal && (
                              <div className="mb-3 p-2 rounded-2" style={{background:"#f0f4ff",fontSize:".8rem",color:"var(--jm-mid)"}}>
                                <i className="bi bi-lightbulb me-1" /><strong>O que você vai aprender:</strong> {t.goal}
                              </div>
                            )}
                            <div className="d-flex gap-3 mb-2" style={{fontSize:".8rem",color:"#6b7a9a"}}>
                              <span><i className="bi bi-play-circle me-1" />{tCourses.length} curso(s)</span>
                              {tHours > 0 && <span><i className="bi bi-clock me-1" />{tHours}h no total</span>}
                            </div>
                            {tCourses.length > 0 && (() => {
                              const done = tCourses.filter(c => isCourseComplete(c)).length;
                              const pct  = Math.round(done / tCourses.length * 100);
                              return (
                                <div className="mb-3">
                                  <div className="d-flex justify-content-between mb-1" style={{fontSize:".75rem"}}>
                                    <span className="text-muted">{done}/{tCourses.length} concluídos</span>
                                    {pct===100
                                      ? <span className="fw-semibold" style={{color:"#0d7a55"}}><i className="bi bi-award-fill me-1"/>Trilha concluída!</span>
                                      : <span className="text-muted">{pct}%</span>}
                                  </div>
                                  <div style={{height:6,background:"#e3e8f0",borderRadius:6,overflow:"hidden"}}>
                                    <div style={{height:"100%",width:pct+"%",background:pct===100?"#0d7a55":"var(--jm-grad)",borderRadius:6,transition:"width .4s"}} />
                                  </div>
                                </div>
                              );
                            })()}
                            {tCourses.length > 0 && (
                              <div>
                                <div className="fw-semibold mb-1" style={{fontSize:".78rem",color:"var(--jm-navy)",textTransform:"uppercase",letterSpacing:".5px"}}>Cursos incluídos</div>
                                {tCourses.map((c,i) => (
                                  <div key={c.id}
                                    className="d-flex align-items-center gap-2 mb-1 p-2 rounded-2"
                                    style={{background:"#f8faff",border:"1px solid #e8f0fe",cursor:"pointer",transition:"background .15s,border-color .15s"}}
                                    onMouseEnter={e=>{e.currentTarget.style.background="#e8f0fe";e.currentTarget.style.borderColor="#b3cdf7";}}
                                    onMouseLeave={e=>{e.currentTarget.style.background="#f8faff";e.currentTarget.style.borderColor="#e8f0fe";}}
                                    onClick={() => { setSub("Cursos"); setPlaying(c.id); markWatched(c.id); }}>
                                    <span style={{width:20,height:20,borderRadius:"50%",background:isCourseComplete(c)?"#0d7a55":"var(--jm-grad)",color:"#fff",fontSize:".68rem",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                                      {isCourseComplete(c) ? <i className="bi bi-check-lg" style={{fontSize:".6rem"}} /> : i+1}
                                    </span>
                                    <span style={{fontSize:".82rem",color:"var(--jm-navy)",flex:1}}>{c.name}</span>
                                    {c.workload && <span className="text-muted" style={{fontSize:".72rem"}}>{c.workload}</span>}
                                    <i className="bi bi-play-circle" style={{color:"var(--jm-blue)",fontSize:".85rem",flexShrink:0}} />
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
          )}

          {sub === "Certificados" && (() => {
            const completedCourses  = courses.filter(c => c.videoUrl && watched.includes(c.id));
            const completedTrails   = trilhas.filter(t => isTrailComplete(t));
            const issuedCourses     = completedCourses.filter(c => issued.some(i => i.id === c.id));
            const pendingCourses    = completedCourses.filter(c => !issued.some(i => i.id === c.id));
            const issuedTrails      = completedTrails.filter(t => issued.some(i => i.id === "T"+t.id));
            const pendingTrails     = completedTrails.filter(t => !issued.some(i => i.id === "T"+t.id));
            const hasPending        = pendingCourses.length > 0 || pendingTrails.length > 0;
            const hasIssued         = issuedCourses.length > 0 || issuedTrails.length > 0;

            if (!hasPending && !hasIssued) return (
              <div className="text-center py-5 text-muted">
                <i className="bi bi-award" style={{fontSize:"3.5rem",opacity:.3,display:"block",marginBottom:"1rem"}} />
                <p className="fw-semibold mb-1" style={{color:"var(--jm-navy)"}}>Nenhum certificado disponível</p>
                <p style={{fontSize:".88rem"}}>Assista aos vídeos dos cursos para desbloquear seus certificados.</p>
              </div>
            );

            return (
              <div>
                {hasPending && (
                  <div className="mb-4">
                    <h6 className="fw-bold mb-3 d-flex align-items-center gap-2" style={{color:"var(--jm-navy)"}}>
                      <i className="bi bi-unlock-fill" style={{color:"#0d7a55"}} />Disponíveis para solicitar
                    </h6>
                    {pendingTrails.map(t => {
                      const tc = courses.filter(c => (t.courseIds||[]).includes(c.id));
                      return (
                        <div key={t.id} className="adm-item-row mb-2" style={{background:"#fff"}}>
                          <div style={{width:40,height:40,borderRadius:10,background:"#e8f6f0",color:"#0d7a55",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"1.2rem"}}>
                            <i className="bi bi-map-fill" />
                          </div>
                          <div className="flex-grow-1">
                            <div className="fw-bold" style={{color:"var(--jm-navy)",fontSize:".93rem"}}>{t.name}</div>
                            <div className="text-muted" style={{fontSize:".77rem"}}>
                              <span className="badge rounded-pill me-1" style={{background:"#e8f6f0",color:"#0d7a55",fontSize:".7rem"}}>Trilha</span>
                              {tc.length} curso(s) concluído(s)
                            </div>
                          </div>
                          <button className="btn btn-sm fw-semibold"
                            style={{background:"var(--jm-grad)",color:"#fff",border:"none",borderRadius:8,fontSize:".82rem",whiteSpace:"nowrap"}}
                            onClick={() => requestCert("T"+t.id)}>
                            <i className="bi bi-award me-1"/>Solicitar Certificado
                          </button>
                        </div>
                      );
                    })}
                    {pendingCourses.map(c => (
                      <div key={c.id} className="adm-item-row mb-2" style={{background:"#fff"}}>
                        <div style={{width:40,height:40,borderRadius:10,background:"#e8f0fe",color:"var(--jm-blue)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"1.2rem"}}>
                          <i className="bi bi-award" />
                        </div>
                        <div className="flex-grow-1">
                          <div className="fw-bold" style={{color:"var(--jm-navy)",fontSize:".93rem"}}>{c.name}</div>
                          <div className="text-muted" style={{fontSize:".77rem"}}>
                            {c.workload && <><i className="bi bi-clock me-1"/>{c.workload} · </>}Curso concluído
                          </div>
                        </div>
                        <button className="btn btn-sm fw-semibold"
                          style={{background:"var(--jm-grad)",color:"#fff",border:"none",borderRadius:8,fontSize:".82rem",whiteSpace:"nowrap"}}
                          onClick={() => requestCert(c.id)}>
                          <i className="bi bi-award me-1"/>Solicitar Certificado
                        </button>
                      </div>
                    ))}
                  </div>
                )}
                {hasIssued && (
                  <div>
                    <h6 className="fw-bold mb-3 d-flex align-items-center gap-2" style={{color:"var(--jm-navy)"}}>
                      <i className="bi bi-award-fill" style={{color:"var(--jm-blue)"}} />Meus Certificados
                    </h6>
                    {issuedTrails.map(t => {
                      const tc = courses.filter(c => (t.courseIds||[]).includes(c.id));
                      return <CertificadoCard key={"t-"+t.id} course={t} studentName={currentUser?.name} isTrilha={true} trailCourseCount={tc.length} />;
                    })}
                    {issuedCourses.map(c => (
                      <CertificadoCard key={c.id} course={c} studentName={currentUser?.name} />
                    ))}
                  </div>
                )}
              </div>
            );
          })()}

        </div>
      );
    }

    /* ─── Tela de seleção de plano (primeiro login) ─────────────────────────── */
    function PlanSelectionScreen({ planos, userName, onSelectPlan }) {
      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#f0f4ff,#e8f0fe)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
          <div style={{maxWidth:960,width:"100%"}}>
            <div className="text-center mb-5">
              <div style={{fontWeight:900,fontSize:"2rem",color:"var(--jm-navy)"}}>JM <span style={{color:"var(--jm-blue)"}}>Cursos</span></div>

                      <span className="badge mb-2 px-3" style={{background:"#e8f0fe",color:"var(--jm-mid)",borderRadius:20,fontSize:".82rem"}}>{p.period}</span>
                      <h4 className="fw-bold mb-2" style={{color:"var(--jm-navy)"}}>{p.name}</h4>
                      <div style={{fontSize:"2.6rem",fontWeight:900,color:"var(--jm-blue)",lineHeight:1}}>
                        {p.price}
                        <span style={{fontSize:".9rem",fontWeight:400,color:"#888"}}>/{p.period}</span>
                      </div>
                      <ul className="list-unstyled w-100 my-4" style={{textAlign:"left"}}>
                        {p.features.map((f,j) => (
                          <li key={j} className="d-flex align-items-center gap-2 mb-2">
                            <i className="bi bi-check-circle-fill" style={{color:"#0d7a55",flexShrink:0}} />
                            <span style={{fontSize:".88rem"}}>{f}</span>
                          </li>
                        ))}
                        {p.features.length===0 && <li className="text-muted text-center" style={{fontSize:".85rem"}}>Sem benefícios listados</li>}
                      </ul>
                      <button style={{background:i===0?"var(--jm-grad)":"#f0f4ff",color:i===0?"#fff":"var(--jm-mid)",border:i===0?"none":"1px solid #d0dcf5",borderRadius:9,padding:".7rem 1.5rem",fontWeight:700,cursor:"pointer",width:"100%",fontSize:".95rem",fontFamily:"inherit"}}
                        onClick={() => onSelectPlan(p)}>
                        Escolher plano
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════
       APP
    ════════════════════════════════════════ */
    function App() {
      const [loggedIn, setLoggedIn]             = useState(false);
      const [isAdmin, setIsAdmin]               = useState(false);
      const [currentUser, setCurrentUser]       = useState(null);
      const [showPlanSelect, setShowPlanSelect] = useState(false);
      const [page, setPage]                     = useState("home");
      const [sub, setSub]                       = useState("Trilhas");
      const [open, setOpen]                     = useState(true);

      const [courses,  setCourses]  = useState([]);
      const [planos,   setPlanos]   = useState([]);
      const [trilhas,  setTrilhas]  = useState([]);
      const [usuarios, setUsuarios] = useState(() => {
        try { return JSON.parse(localStorage.getItem("jm_usuarios") || "[]"); } catch { return []; }
      });
      const [subscriptions, setSubscriptions] = useState(() => {
        try { return JSON.parse(localStorage.getItem("jm_subscriptions") || "[]"); } catch { return []; }
      });

      function saveAndSetUsuarios(updater) {
        setUsuarios(prev => {
          const next = typeof updater === "function" ? updater(prev) : updater;
          localStorage.setItem("jm_usuarios", JSON.stringify(next));
          return next;
        });
      }

      function saveAndSetSubscriptions(updater) {
        setSubscriptions(prev => {
          const next = typeof updater === "function" ? updater(prev) : updater;
          localStorage.setItem("jm_subscriptions", JSON.stringify(next));
          return next;
        });
      }

      function handleSelectPlan(plan) {
        if (!currentUser) return;
        const newSub = {
          id: uid(), userId: currentUser.id,
          userName: currentUser.name, userEmail: currentUser.email,
          planId: plan.id, planName: plan.name,
          planPeriod: plan.period, planPrice: plan.price,
          startDate: new Date().toLocaleDateString("pt-BR"),
          status: "ativo"
        };
        saveAndSetSubscriptions(prev => [
          ...prev.map(s => s.userId === currentUser.id && s.status === "ativo" ? {...s, status:"cancelado"} : s),
          newSub
        ]);
        const updatedUser = {...currentUser, planId: plan.id, plan: plan.name};
        setCurrentUser(updatedUser);
        saveAndSetUsuarios(prev => prev.map(u => u.id === currentUser.id ? updatedUser : u));
        setShowPlanSelect(false);
        setPage("home");
      }

      if (!loggedIn) {
        return <LoginPage usuarios={usuarios} onLogin={(admin, userData) => {
          if (admin) { setIsAdmin(true); setLoggedIn(true); return; }
          if (userData?.existingUser) {
            // existing student login
            const u = userData.existingUser;
            setCurrentUser(u); setLoggedIn(true);
            const hasPlan = subscriptions.some(s => s.userId === u.id && s.status === "ativo");
            if (!hasPlan) setShowPlanSelect(true);
            return;
          }
          // new registration
          const newUser = {
            id: uid(), name: userData.name, email: userData.email,
            plan: "Gratuito", planId: null, status: "ativo",
            date: new Date().toLocaleDateString("pt-BR")
          };
          saveAndSetUsuarios(prev => [...prev, newUser]);
          setCurrentUser(newUser); setLoggedIn(true);
          if (planos.length > 0) setShowPlanSelect(true);
        }} />;
      }

      if (isAdmin) {
        return (
          <AdminPanel
            courses={courses}      setCourses={setCourses}
            planos={planos}        setPlanos={setPlanos}
            trilhas={trilhas}      setTrilhas={setTrilhas}
            usuarios={usuarios}    setUsuarios={saveAndSetUsuarios}
            subscriptions={subscriptions}
            onLogout={() => { setIsAdmin(false); setLoggedIn(false); setCurrentUser(null); }}
          />
        );
      }

      if (showPlanSelect && planos.length > 0) {
        return (
          <PlanSelectionScreen
            planos={planos}
            userName={currentUser?.name || ""}
            onSelectPlan={handleSelectPlan}
          />
        );
      }

      function navTo(p, t) { setPage(p); if (t) setSub(t); }

      return (
        <div className="d-flex" style={{minHeight:"100vh"}}>
          <div className="jm-sidebar" style={{width:open?210:52,minWidth:open?210:52}}>
            <div className="p-2 border-bottom d-flex align-items-center gap-2">
              <button className="btn btn-light btn-sm" style={{minWidth:36}} onClick={() => setOpen(!open)}>
                {open ? "✕" : "☰"}
              </button>
              {open && (
                <span className="jm-sidebar-brand">
                  <span style={{color:"var(--jm-navy)"}}>JM</span>{" "}
                  <span style={{background:"linear-gradient(90deg,var(--jm-mid),var(--jm-blue))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Cursos</span>
                </span>
              )}
            </div>
            <ul className="nav flex-column gap-1 p-2 flex-grow-1">
              <li>
                <button className={"jm-nav-btn"+(page==="home"?" active":"")} onClick={() => navTo("home")}>
                  <i className="bi bi-house me-2" />{open && "Home"}
                </button>
              </li>
              <li>
                <button className={"jm-nav-btn"+(page==="jmcursos"?" active":"")} onClick={() => navTo("jmcursos")}>
                  <i className="bi bi-collection me-2" />{open && "JM Cursos"}
                </button>
              </li>
            </ul>
            <div className="p-2 border-top">
              <button className="jm-nav-btn w-100" style={{color:"#c0392b"}} onClick={() => { setLoggedIn(false); setCurrentUser(null); setShowPlanSelect(false); }}>
                <i className="bi bi-box-arrow-left me-2" />{open && "Sair"}
              </button>
            </div>
          </div>

          <div className="flex-grow-1 p-4" style={{overflowY:"auto"}}>
            {page === "home" && (
              <HomePage courses={courses} planos={planos} trilhas={trilhas} onNavigate={navTo} />
            )}
            {page === "jmcursos" && (
              <JmCursosPage sub={sub} setSub={setSub}
                courses={courses} planos={planos} trilhas={trilhas}
                currentUser={currentUser} subscriptions={subscriptions}
                onSelectPlan={handleSelectPlan} />
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

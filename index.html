<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev.JM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    const subPages = [
      "Trilhas", "Cursos", "Módulos", "Aulas",
      "Usuários", "Assinaturas", "Certificados"
    ];

    function App() {
      const [page, setPage] = useState("home");
      const [sub, setSub] = useState("Trilhas");
      const [open, setOpen] = useState(true);

      return (
        <div className="d-flex" style={{minHeight: "100vh"}}>

          {/* Sidebar */}
          <div className="bg-white border-end d-flex flex-column"
            style={{width: open ? 200 : 52, minWidth: open ? 200 : 52, transition: "width 0.2s"}}>

            {/* Toggle */}
            <div className="p-2 border-bottom">
              <button className="btn btn-light w-100 text-start" onClick={() => setOpen(!open)}>
                {open ? "✕  Dev.JM" : "☰"}
              </button>
            </div>

            {/* Nav items */}
            <ul className="nav flex-column gap-1 p-2">
              <li className="nav-item">
                <button
                  className={"btn btn-link text-decoration-none text-start w-100 px-2 py-2 rounded " +
                    (page === "home" ? "fw-bold text-dark bg-light" : "text-secondary")}
                  onClick={() => setPage("home")}
                >
                  {open ? "Home" : "H"}
                </button>
              </li>
              <li className="nav-item">
                <button
                  className={"btn btn-link text-decoration-none text-start w-100 px-2 py-2 rounded " +
                    (page === "sgcursos" ? "fw-bold text-dark bg-light" : "text-secondary")}
                  onClick={() => setPage("sgcursos")}
                >
                  {open ? "SG Cursos" : "SG"}
                </button>
              </li>
            </ul>
          </div>

          {/* Conteúdo */}
          <div className="flex-grow-1 p-5">
            {page === "home" && (
              <div className="text-center py-5">
                <h2 className="fw-bold">Bem-vindo ao Dev.JM</h2>
              </div>
            )}

            {page === "sgcursos" && (
              <div>
                <ul className="nav nav-tabs mb-4">
                  {subPages.map(s => (
                    <li className="nav-item" key={s}>
                      <button
                        className={"nav-link " + (sub === s ? "active" : "")}
                        onClick={() => setSub(s)}
                      >{s}</button>
                    </li>
                  ))}
                </ul>
                <h3 className="fw-semibold">{sub}</h3>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JM Cursos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <style>
    body { background: #f4f6fb; }

    /* ── Cores da marca ── */
    :root {
      --jm-navy: #0d1b4b;
      --jm-mid:  #1a3a8f;
      --jm-blue: #1565c0;
      --jm-grad: linear-gradient(135deg, #0d1b4b 0%, #1a3a8f 55%, #1565c0 100%);
    }

    /* ── Login ── */
    .jm-login-bg {
      background: var(--jm-grad);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .jm-card {
      background: #fff; border-radius: 18px;
      box-shadow: 0 24px 64px rgba(13,27,75,.5);
      width: 100%; max-width: 430px; padding: 2.75rem 2.25rem;
    }
    .jm-brand-title { font-size: 2.1rem; font-weight: 900; letter-spacing: -1px; }
    .jm-brand-jm    { color: var(--jm-navy); }
    .jm-brand-cursos{ background: linear-gradient(90deg, var(--jm-mid), var(--jm-blue));
                      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .jm-divider {
      height: 3px; width: 52px;
      background: var(--jm-grad); border-radius: 2px; margin: 0 auto 1.6rem;
    }
    .jm-toggle-btn {
      background: #f0f4ff; border: none; border-radius: 8px;
      padding: .45rem 1.1rem; font-weight: 600; font-size: .9rem;
      color: var(--jm-mid); transition: all .2s; cursor: pointer;
    }
    .jm-toggle-btn.active {
      background: var(--jm-grad); color: #fff;
      box-shadow: 0 3px 12px rgba(21,101,192,.4);
    }
    .jm-toggle-btn:hover:not(.active) { background: #dce8ff; }
    .jm-input {
      border: 1.5px solid #d0d9ef; border-radius: 9px;
      padding: .62rem .9rem; font-size: .95rem; width: 100%;
      box-sizing: border-box; outline: none; transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    .jm-input:focus { border-color: var(--jm-blue); box-shadow: 0 0 0 3px rgba(21,101,192,.14); }
    .jm-submit-btn {
      background: var(--jm-grad); border: none; border-radius: 9px; color: #fff;
      font-weight: 700; font-size: 1rem; padding: .7rem;
      width: 100%; cursor: pointer; transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 16px rgba(21,101,192,.38); font-family: inherit;
    }
    .jm-submit-btn:hover  { opacity: .91; transform: translateY(-1px); }
    .jm-submit-btn:active { transform: translateY(0); }
    .jm-label { font-size: .84rem; font-weight: 600; color: var(--jm-mid); margin-bottom: .3rem; display: block; }

    /* ── Sidebar ── */
    .jm-sidebar {
      background: #fff; border-right: 1px solid #e3e8f0;
      display: flex; flex-direction: column;
      transition: width .2s, min-width .2s; overflow: hidden;
      box-shadow: 2px 0 8px rgba(13,27,75,.06);
    }
    .jm-sidebar-brand { font-weight: 900; font-size: 1.05rem; letter-spacing: -.5px; }
    .jm-nav-btn {
      background: none; border: none; text-align: left;
      padding: .52rem .8rem; border-radius: 9px;
      width: 100%; cursor: pointer; font-size: .92rem;
      color: #5a6a8a; transition: background .15s, color .15s;
      white-space: nowrap; overflow: hidden; font-family: inherit;
    }
    .jm-nav-btn:hover  { background: #f0f4ff; color: var(--jm-mid); }
    .jm-nav-btn.active { background: #e8f0fe; color: var(--jm-navy); font-weight: 700; }

    /* ── Admin Panel ── */
    .adm-nav {
      background: var(--jm-grad);
      padding: 1rem 1.75rem;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 18px rgba(13,27,75,.38);
      position: relative;
    }
    .adm-nav::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
      background: linear-gradient(90deg,rgba(255,255,255,.3),rgba(255,255,255,.06),transparent);
    }
    .adm-tabs {
      background: #eef2fb;
      border-bottom: 2px solid #d4deef;
      display: flex; gap: 0; overflow-x: auto; padding: 0 1.75rem;
    }
    .adm-tab {
      background: none; border: none; border-bottom: 3px solid transparent;
      padding: .85rem 1.1rem; font-size: .86rem; font-weight: 600;
      color: #6b7a9a; cursor: pointer; white-space: nowrap;
      transition: color .15s, border-color .15s, background .15s;
      font-family: inherit; margin-bottom: -2px;
    }
    .adm-tab.active {
      color: var(--jm-blue); border-bottom-color: var(--jm-blue);
      background: rgba(255,255,255,.75);
    }
    .adm-tab:hover:not(.active) { color: var(--jm-mid); background: rgba(255,255,255,.45); }
    .adm-card {
      background: #fff; border: 1px solid #e3e8f0;
      border-radius: 12px; padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .adm-section-title {
      display: flex; align-items: center; gap: .8rem;
      padding-bottom: 1rem; margin-bottom: 1.5rem;
      border-bottom: 2px solid #eef2fb;
    }
    .adm-section-icon {
      width: 42px; height: 42px; border-radius: 11px;
      background: var(--jm-grad);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.15rem; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(21,101,192,.28);
    }
    .adm-info-banner {
      background: linear-gradient(135deg,#e8f0fe,#f0f6ff);
      border: 1px solid #c5d8fa; border-left: 4px solid var(--jm-blue);
      border-radius: 10px; padding: .85rem 1.1rem;
      color: var(--jm-mid); font-size: .88rem; margin-bottom: 1.5rem;
    }
    .adm-stat-card {
      background: #fff; border: 1px solid #e3e8f0; border-radius: 12px;
      padding: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,.04);
      transition: transform .2s, box-shadow .2s; cursor: default;
    }
    .adm-stat-card.clickable:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(13,27,75,.1); cursor: pointer; }
    .adm-item-row {
      display: flex; align-items: center; gap: .6rem;
      padding: .75rem; border-radius: 9px;
      border: 1px solid #e3e8f0; background: #f8faff;
      margin-bottom: .5rem; transition: border-color .15s, background .15s;
    }
    .adm-item-row:hover { border-color: #b8cef5; background: #f0f4ff; }
    .adm-input {
      border: 1.5px solid #d0d9ef; border-radius: 8px;
      padding: .48rem .8rem; font-size: .9rem;
      outline: none; transition: border-color .2s; font-family: inherit; width: 100%;
      box-sizing: border-box;
    }
    .adm-input:focus { border-color: var(--jm-blue); box-shadow: 0 0 0 3px rgba(21,101,192,.1); }
    .adm-textarea {
      border: 1.5px solid #d0d9ef; border-radius: 8px;
      padding: .5rem .8rem; font-size: .9rem;
      outline: none; transition: border-color .2s; font-family: inherit;
      width: 100%; box-sizing: border-box; resize: vertical; min-height: 72px;
    }
    .adm-textarea:focus { border-color: var(--jm-blue); box-shadow: 0 0 0 3px rgba(21,101,192,.1); }
    .adm-btn-primary {
      background: var(--jm-grad); border: none; border-radius: 8px;
      color: #fff; font-weight: 600; font-size: .88rem;
      padding: .5rem 1rem; cursor: pointer; font-family: inherit;
      white-space: nowrap; transition: opacity .2s;
      box-shadow: 0 3px 10px rgba(21,101,192,.25);
    }
    .adm-btn-primary:hover { opacity: .88; }

    /* ── Home Hero ── */
    .home-hero {
      background: var(--jm-grad);
      border-radius: 16px; padding: 2rem 2rem;
      margin-bottom: 1.5rem; position: relative; overflow: hidden;
      color: #fff;
    }
    .home-hero-deco {
      position: absolute; right: -20px; top: -20px;
      font-size: 9rem; font-weight: 900; letter-spacing: -8px;
      color: rgba(255,255,255,.07); line-height: 1; pointer-events: none;
      user-select: none;
    }
    .home-hero-cap {
      font-size: 3.2rem; line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.25));
    }

    /* ── Course cards (user view) ── */
    .course-card {
      background: #fff; border-radius: 12px; overflow: hidden;
      border: 1px solid #e3e8f0; box-shadow: 0 2px 10px rgba(0,0,0,.05);
      transition: transform .2s, box-shadow .2s; cursor: pointer;
    }
    .course-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(13,27,75,.12); }
    .course-thumb {
      height: 130px; background: var(--jm-grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: rgba(255,255,255,.6);
    }

    /* ── Certificado ── */
    .cert-wrap {
      background: #fffef9; border: 6px solid var(--jm-navy);
      border-radius: 8px; padding: 8px;
      max-width: 740px; margin: 0 auto;
    }
    .cert-inner {
      border: 2px solid var(--jm-blue); border-radius: 4px;
      padding: 3rem 3.5rem; text-align: center;
      background: linear-gradient(160deg,#fffef9,#f5f8ff);
      position: relative;
    }
    .cert-corner {
      position: absolute; width: 28px; height: 28px; border-color: var(--jm-navy); border-style: solid;
    }
    .cert-corner.tl { top:10px; left:10px; border-width:3px 0 0 3px; }
    .cert-corner.tr { top:10px; right:10px; border-width:3px 3px 0 0; }
    .cert-corner.bl { bottom:10px; left:10px; border-width:0 0 3px 3px; }
    .cert-corner.br { bottom:10px; right:10px; border-width:0 3px 3px 0; }
    .cert-title {
      font-size: 1.5rem; font-weight: 900; letter-spacing: 5px;
      text-transform: uppercase;
      background: var(--jm-grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .cert-divider { width:72px; height:3px; background:var(--jm-grad); border-radius:2px; margin:.75rem auto; }
    .cert-student {
      font-size: 2rem; font-weight: 900; color: var(--jm-navy);
      border-bottom: 2px solid var(--jm-blue); padding-bottom:.4rem; display:inline-block;
    }
    .cert-course { font-size:1.2rem; font-weight:700; color:var(--jm-blue); }
    .cert-sig-line { border-top:1.5px solid var(--jm-navy); width:160px; margin:.5rem auto .2rem; }

    /* ── Plan cards ── */
    .plan-card {
      background: #fff; border-radius: 14px;
      border: 2px solid #e3e8f0; padding: 1.5rem;
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
      transition: border-color .2s, box-shadow .2s;
    }
    .plan-card.featured {
      border-color: var(--jm-blue);
      box-shadow: 0 6px 24px rgba(21,101,192,.18);
    }
    .plan-badge {
      background: var(--jm-grad); color: #fff;
      font-size: .72rem; font-weight: 700; border-radius: 20px;
      padding: .15rem .6rem; letter-spacing: .4px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    function uid() { return Date.now() + Math.random(); }

    function toEmbed(url) {
      if (!url) return null;
      const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
      return m ? "https://www.youtube.com/embed/" + m[1] : url;
    }

    /* ════════════════════════════════════════
       LOGIN PAGE
    ════════════════════════════════════════ */
    function LoginPage({ onLogin, usuarios }) {
      const [mode, setMode]         = useState("login");
      const [name, setName]         = useState("");
      const [email, setEmail]       = useState("");
      const [password, setPassword] = useState("");
      const [error, setError]       = useState("");

      function handleSubmit(e) {
        e.preventDefault();
        setError("");
        if (mode === "admin") {
          if (email !== "admin@gmail.com" || password !== "123456") {
            setError("E-mail ou senha de administrador incorretos.");
            return;
          }
          onLogin(true, null);
          return;
        }
        if (mode === "register") {
          if (!name.trim()) { setError("Informe seu nome."); return; }
          if (password.length < 6) { setError("A senha deve ter pelo menos 6 caracteres."); return; }
          const exists = usuarios.some(u => u.email.toLowerCase() === email.toLowerCase());
          if (exists) { setError("Este e-mail já está cadastrado. Use 'Entrar'."); return; }
          onLogin(false, { name, email, password });
          return;
        }
        // login mode — find existing user
        const found = usuarios.find(u => u.email.toLowerCase() === email.toLowerCase());
        if (!found) { setError("E-mail não encontrado. Cadastre-se primeiro."); return; }
        onLogin(false, { existingUser: found });
      }

      const btnLabel = mode === "login" ? "Entrar na plataforma"
                     : mode === "admin"  ? "Entrar como Admin"
                     :                    "Criar minha conta";

      return (
        <div className="jm-login-bg">
          <div className="jm-card">
            <div className="text-center mb-1">
              <i className="bi bi-mortarboard-fill" style={{fontSize:"2.6rem",color:"var(--jm-navy)"}} />
              <div className="jm-brand-title mt-1">
                <span className="jm-brand-jm">JM</span>{" "}
                <span className="jm-brand-cursos">Cursos</span>
              </div>
              <p className="text-muted mt-1 mb-3" style={{fontSize:".82rem"}}>Plataforma de ensino online</p>
            </div>
            <div className="jm-divider" />

            <div className="d-flex gap-2 justify-content-center mb-4">
              <button className={"jm-toggle-btn" + (mode==="login"    ? " active":"")} onClick={() => { setMode("login");    setError(""); }}>Entrar</button>
              <button className={"jm-toggle-btn" + (mode==="admin"    ? " active":"")} onClick={() => { setMode("admin");    setError(""); }}>Admin</button>
              <button className={"jm-toggle-btn" + (mode==="register" ? " active":"")} onClick={() => { setMode("register"); setError(""); }}>Criar conta</button>
            </div>

            <form onSubmit={handleSubmit}>
              {mode === "register" && (
                <div className="mb-3">
                  <label className="jm-label">Nome completo</label>
                  <input type="text" className="jm-input" placeholder="Seu nome"
                    value={name} onChange={e => setName(e.target.value)} required />
                </div>
              )}
              <div className="mb-3">
                <label className="jm-label">E-mail</label>
                <input type="email" className="jm-input" placeholder="seu@email.com"
                  value={email} onChange={e => setEmail(e.target.value)} required />
              </div>
              <div className="mb-3">
                <label className="jm-label">Senha</label>
                <input type="password" className="jm-input" placeholder="••••••••"
                  value={password} onChange={e => setPassword(e.target.value)} required />
              </div>
              {error && (
                <div className="rounded-2 px-3 py-2 mb-2" style={{background:"#fff0f0",border:"1px solid #f5c2c2",color:"#c0392b",fontSize:".84rem"}}>
                  <i className="bi bi-exclamation-circle me-2" />{error}
                </div>
              )}
              <button type="submit" className="jm-submit-btn mt-1">{btnLabel}</button>
            </form>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════
       HOME PAGE
    ════════════════════════════════════════ */
    function HomePage({ courses, planos, trilhas, onNavigate }) {
      const stats = [
        { icon: "bi-map",            label: "Trilhas",             value: trilhas.length || 0,  color: "var(--jm-blue)" },
        { icon: "bi-play-circle",    label: "Cursos disponíveis",  value: courses.length || 0,  color: "var(--jm-mid)"  },
        { icon: "bi-credit-card-2-front", label: "Planos ativos",  value: planos.length || 0,   color: "#0d7a55"        },
        { icon: "bi-patch-check",    label: "Certificados",        value: "2",                  color: "#7b2d8b"        },
      ];

      return (
        <div>
          {/* Hero */}
          <div className="home-hero">
            <div className="home-hero-deco">JM</div>
            <div className="d-flex align-items-center gap-4 flex-wrap">
              <div className="text-center">
                <div className="home-hero-cap">
                  <i className="bi bi-mortarboard-fill" />
                </div>
                <div style={{fontWeight:900,fontSize:"2rem",letterSpacing:"-1px",lineHeight:1,marginTop:".2rem",color:"rgba(255,255,255,.95)"}}>
                  JM<span style={{color:"rgba(255,255,255,.55)"}}> Cursos</span>
                </div>
              </div>
              <div className="flex-grow-1">
                <div className="d-flex align-items-center gap-2 mb-1">
                  <span className="badge rounded-pill px-3 py-1 fw-semibold"
                    style={{background:"rgba(255,255,255,.18)",fontSize:".78rem",letterSpacing:".4px"}}>
                    <i className="bi bi-star-fill me-1" style={{color:"#ffd700"}} />ASSINANTE ATIVO
                  </span>
                </div>
                <h3 className="fw-bold mb-1" style={{fontSize:"1.5rem"}}>Olá, bem-vindo de volta!</h3>
                <p style={{opacity:.8,fontSize:".92rem",marginBottom:0}}>
                  Continue sua jornada de aprendizado — todo conhecimento ao seu alcance.
                </p>
              </div>
            </div>
          </div>

          {/* Stats */}
          <div className="row g-3 mb-4">
            {stats.map((s,i) => (
              <div className="col-6 col-lg-3" key={i}>
                <div className="bg-white rounded-3 p-3 d-flex align-items-center gap-3"
                  style={{border:"1px solid #e3e8f0",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
                  <div className="rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
                    style={{width:46,height:46,background:s.color+"1a",color:s.color,fontSize:"1.25rem"}}>
                    <i className={"bi " + s.icon} />
                  </div>
                  <div>
                    <div className="fw-bold lh-1" style={{fontSize:"1.4rem",color:s.color}}>{s.value}</div>
                    <div className="text-muted mt-1" style={{fontSize:".75rem"}}>{s.label}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div className="row g-3">
            {/* Cursos disponíveis */}
            <div className="col-12 col-lg-8">
              <div className="bg-white rounded-3 p-4" style={{border:"1px solid #e3e8f0",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
                <div className="d-flex align-items-center justify-content-between mb-3">
                  <h6 className="fw-bold mb-0" style={{color:"var(--jm-navy)"}}>
                    <i className="bi bi-play-circle me-2" style={{color:"var(--jm-blue)"}} />Cursos disponíveis
                  </h6>
                  <button className="btn btn-sm fw-semibold"
                    style={{background:"#f0f4ff",color:"var(--jm-mid)",border:"1px solid #d0dcf5",borderRadius:8,fontSize:".8rem"}}
                    onClick={() => onNavigate("jmcursos","Cursos")}>
                    Ver todos <i className="bi bi-arrow-right ms-1" />
                  </button>
                </div>
                {courses.length === 0 ? (
                  <div className="text-center py-4" style={{color:"#aab"}}>
                    <i className="bi bi-inbox" style={{fontSize:"2rem"}} />
                    <p className="mt-2 mb-0" style={{fontSize:".88rem"}}>Nenhum curso disponível ainda.</p>
                  </div>
                ) : (
                  <div className="row g-2">
                    {courses.slice(0,4).map(c => (
                      <div className="col-6" key={c.id}>
                        <div className="course-card" onClick={() => onNavigate("jmcursos","Cursos")}>
                          <div className="course-thumb">
                            <i className="bi bi-play-circle-fill" />
                          </div>
                          <div className="p-2">
                            <div className="fw-semibold" style={{fontSize:".85rem",color:"var(--jm-navy)"}}>{c.name}</div>
                            {c.description && <div className="text-muted mt-1" style={{fontSize:".75rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.description}</div>}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Planos + Acesso rápido */}
            <div className="col-12 col-lg-4 d-flex flex-column gap-3">
              <div className="bg-white rounded-3 p-4" style={{border:"1px solid #e3e8f0",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
                <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
                  <i className="bi bi-credit-card-2-front me-2" style={{color:"#0d7a55"}} />Meu plano
                </h6>
                {planos.length > 0 ? (
                  <div className="p-3 rounded-3" style={{background:"linear-gradient(135deg,#e8f0fe,#f0f6ff)",border:"1px solid #c5d8fa"}}>
                    <div className="fw-bold" style={{color:"var(--jm-navy)",fontSize:".95rem"}}>{planos[0].name}</div>
                    <div className="fw-bold mt-1" style={{color:"var(--jm-blue)",fontSize:"1.2rem"}}>{planos[0].price}<span style={{fontSize:".75rem",fontWeight:400,color:"#888"}}>/{planos[0].period}</span></div>
                  </div>
                ) : (
                  <p className="text-muted mb-0" style={{fontSize:".85rem"}}>Nenhum plano configurado.</p>
                )}
              </div>

              <div className="bg-white rounded-3 p-4" style={{border:"1px solid #e3e8f0",boxShadow:"0 2px 8px rgba(0,0,0,.04)"}}>
                <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
                  <i className="bi bi-grid me-2" style={{color:"var(--jm-blue)"}} />Acesso rápido
                </h6>
                <div className="d-flex flex-wrap gap-2">
                  {["Trilhas","Cursos","Aulas","Certificados","Assinaturas"].map(t => (
                    <button key={t} onClick={() => onNavigate("jmcursos", t)}
                      className="btn btn-sm fw-semibold"
                      style={{background:"#f0f4ff",color:"var(--jm-mid)",border:"1px solid #d0dcf5",borderRadius:8,fontSize:".8rem"}}>

       ADMIN PANEL
    ════════════════════════════════════════ */
    const ADMIN_TABS = [
      { key:"visao-geral",  label:"Visão Geral", icon:"bi-speedometer2"        },
      { key:"cursos",       label:"Cursos",      icon:"bi-play-circle"         },
      { key:"trilhas",      label:"Trilhas",     icon:"bi-map"                 },
      { key:"usuarios",     label:"Usuários",    icon:"bi-people"              },
      { key:"planos",       label:"Planos",      icon:"bi-credit-card-2-front" },
      { key:"assinaturas",  label:"Assinaturas", icon:"bi-receipt"             },
    ];

    /* ── Cursos ── */
    function AdminCursos({ courses, setCourses }) {
      const empty = { name:"", description:"", videoUrl:"", workload:"" };
      const [form, setForm]       = useState(empty);
      const [editing, setEditing] = useState(null);
      const [playing, setPlaying] = useState(null);

      function save(e) {
        e.preventDefault();
        if (!form.name.trim()) return;
        if (editing !== null) {
          setCourses(prev => prev.map(c => c.id === editing ? {...form, id: editing} : c));
          setEditing(null);
        } else {
          setCourses(prev => [...prev, {...form, id: uid()}]);
        }
        setForm(empty);
      }

      function startEdit(c) { setForm({name:c.name,description:c.description,videoUrl:c.videoUrl,workload:c.workload||""}); setEditing(c.id); }
      function remove(id)   { setCourses(prev => prev.filter(c => c.id !== id)); if (playing === id) setPlaying(null); }
      function cancel()     { setForm(empty); setEditing(null); }

      return (
        <div className="row g-4">
          <div className="col-12 col-lg-5">
            <div className="adm-card">
              <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
                <i className={"bi bi-" + (editing !== null ? "pencil" : "plus-circle") + " me-2"} style={{color:"var(--jm-blue)"}} />
                {editing !== null ? "Editar curso" : "Novo curso"}
              </h6>
              <form onSubmit={save}>
                <div className="mb-3">
                  <label className="jm-label">Nome do curso</label>
                  <input className="adm-input" placeholder="Ex: React do Zero ao Avançado"
                    value={form.name} onChange={e => setForm({...form, name: e.target.value})} required />
                </div>
                <div className="mb-3">
                  <label className="jm-label">Descrição</label>
                  <textarea className="adm-textarea" placeholder="Descreva o conteúdo do curso..."
                    value={form.description} onChange={e => setForm({...form, description: e.target.value})} />
                </div>
                <div className="mb-3">
                  <label className="jm-label">Carga horária</label>
                  <input className="adm-input" placeholder="Ex: 40 horas"
                    value={form.workload} onChange={e => setForm({...form, workload: e.target.value})} />
                </div>
                <div className="mb-4">
                  <label className="jm-label">URL do vídeo (YouTube ou direto)</label>
                  <input className="adm-input" placeholder="https://youtube.com/watch?v=..."
                    value={form.videoUrl} onChange={e => setForm({...form, videoUrl: e.target.value})} />
                </div>
                <div className="d-flex gap-2">
                  <button type="submit" className="adm-btn-primary flex-grow-1">
                    <i className={"bi bi-" + (editing !== null ? "check-lg" : "plus-lg") + " me-1"} />
                    {editing !== null ? "Salvar" : "Adicionar"}
                  </button>
                  {editing !== null && (
                    <button type="button" className="btn btn-light btn-sm px-3" onClick={cancel}>Cancelar</button>
                  )}
                </div>
              </form>
            </div>
          </div>

          <div className="col-12 col-lg-7">
            <div className="adm-card">
              <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
                <i className="bi bi-list-ul me-2" style={{color:"var(--jm-blue)"}} />
                Cursos cadastrados <span className="badge ms-1 rounded-pill" style={{background:"#e8f0fe",color:"var(--jm-mid)",fontSize:".75rem"}}>{courses.length}</span>
              </h6>
              {courses.length === 0 && <p className="text-muted" style={{fontSize:".88rem"}}>Nenhum curso ainda. Adicione o primeiro!</p>}
              {courses.map(c => (
                <div key={c.id}>
                  <div className="adm-item-row">
                    <div className="flex-grow-1 min-width-0">
                      <div className="fw-semibold" style={{fontSize:".92rem",color:"var(--jm-navy)"}}>{c.name}</div>
                      {c.description && <div className="text-muted mt-1" style={{fontSize:".78rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.description}</div>}
                      {c.workload && <span className="badge mt-1" style={{background:"#e8f0fe",color:"var(--jm-mid)",fontSize:".72rem"}}><i className="bi bi-clock me-1"/>{c.workload}</span>}
                      {c.videoUrl && (
                        <button className="btn btn-sm mt-1 p-0 fw-semibold" style={{color:"var(--jm-blue)",fontSize:".78rem",background:"none",border:"none"}}
                          onClick={() => setPlaying(playing === c.id ? null : c.id)}>
                          <i className={"bi bi-" + (playing===c.id ? "chevron-up" : "play-fill") + " me-1"} />
                          {playing === c.id ? "Fechar vídeo" : "Ver vídeo"}
                        </button>
                      )}
                    </div>
                    <div className="d-flex gap-1 flex-shrink-0">
                      <button className="btn btn-sm btn-light" onClick={() => startEdit(c)} title="Editar">
                        <i className="bi bi-pencil" />
                      </button>
                      <button className="btn btn-sm btn-light text-danger" onClick={() => remove(c.id)} title="Remover">
                        <i className="bi bi-trash" />
                      </button>
                    </div>
                  </div>
                  {playing === c.id && c.videoUrl && (
                    <div className="mb-2 rounded-3 overflow-hidden" style={{border:"1px solid #d0dcf5"}}>
                      <div style={{position:"relative",paddingTop:"56.25%",background:"#000"}}>
                        <iframe src={toEmbed(c.videoUrl)} allowFullScreen
                          style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}} />
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ── Assinaturas ── */
    function AdminPlanos({ planos, setPlanos }) {
      const empty = { name:"", price:"", period:"mensal", features:[""] };
      const [form, setForm]       = useState(empty);
      const [editing, setEditing] = useState(null);

      function setFeat(i, v) { setForm(f => { const arr=[...f.features]; arr[i]=v; return {...f,features:arr}; }); }
      function addFeat()     { setForm(f => ({...f, features:[...f.features,""]})); }
      function remFeat(i)    { setForm(f => ({...f, features:f.features.filter((_,x)=>x!==i)})); }

      function save(e) {
        e.preventDefault();
        if (!form.name.trim()) return;
        const clean = {...form, features: form.features.filter(f=>f.trim())};
        if (editing !== null) {
          setPlanos(prev => prev.map(p => p.id === editing ? {...clean, id:editing} : p));
          setEditing(null);
        } else {
          setPlanos(prev => [...prev, {...clean, id:uid()}]);
        }
        setForm(empty);
      }
      function startEdit(p) { setForm({name:p.name,price:p.price,period:p.period,features:[...p.features,""].slice(0,Math.max(p.features.length,1))}); setEditing(p.id); }
      function remove(id)   { setPlanos(prev => prev.filter(p => p.id !== id)); }
      function cancel()     { setForm(empty); setEditing(null); }

      return (
        <div className="row g-4">
          <div className="col-12 col-lg-5">
            <div className="adm-card">
              <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
                <i className={"bi bi-" + (editing!==null ? "pencil":"plus-circle") + " me-2"} style={{color:"var(--jm-blue)"}} />
                {editing!==null ? "Editar plano" : "Novo plano"}
              </h6>
              <form onSubmit={save}>
                <div className="mb-3">
                  <label className="jm-label">Nome do plano</label>
                  <input className="adm-input" placeholder="Ex: Plano Premium"
                    value={form.name} onChange={e => setForm({...form,name:e.target.value})} required />
                </div>
                <div className="row g-2 mb-3">
                  <div className="col-7">
                    <label className="jm-label">Preço</label>
                    <input className="adm-input" placeholder="R$ 29,90"
                      value={form.price} onChange={e => setForm({...form,price:e.target.value})} />
                  </div>
                  <div className="col-5">
                    <label className="jm-label">Período</label>
                    <select className="adm-input" value={form.period} onChange={e => setForm({...form,period:e.target.value})}>
                      <option value="mensal">Mensal</option>
                      <option value="semestral">Semestral</option>
                      <option value="anual">Anual</option>
                    </select>
                  </div>
                </div>
                <div className="mb-4">
                  <label className="jm-label">Recursos inclusos</label>
                  {form.features.map((f,i) => (
                    <div key={i} className="d-flex gap-1 mb-1">
                      <input className="adm-input" placeholder={"Recurso " + (i+1)}
                        value={f} onChange={e => setFeat(i, e.target.value)} />
                      {form.features.length > 1 && (
                        <button type="button" className="btn btn-sm btn-light text-danger px-2" onClick={() => remFeat(i)}>
                          <i className="bi bi-x-lg" />
                        </button>
                      )}
                    </div>
                  ))}
                  <button type="button" className="btn btn-sm mt-1" style={{color:"var(--jm-blue)",background:"#f0f4ff",border:"1px solid #d0dcf5",borderRadius:7,fontSize:".8rem"}}
                    onClick={addFeat}>
                    <i className="bi bi-plus me-1" />Adicionar recurso
                  </button>
                </div>
                <div className="d-flex gap-2">
                  <button type="submit" className="adm-btn-primary flex-grow-1">
                    <i className={"bi bi-" + (editing!==null ? "check-lg":"plus-lg") + " me-1"} />
                    {editing!==null ? "Salvar" : "Adicionar"}
                  </button>
                  {editing!==null && <button type="button" className="btn btn-light btn-sm px-3" onClick={cancel}>Cancelar</button>}
                </div>
              </form>
            </div>
          </div>

          <div className="col-12 col-lg-7">
            {planos.length === 0 && (
              <p className="text-muted mt-3" style={{fontSize:".88rem"}}>Nenhum plano ainda. Crie o primeiro ao lado.</p>
            )}
            <div className="row g-3">
              {planos.map((p,i) => (
                <div key={p.id} className="col-12 col-sm-6">
                  <div style={{background:"#fff",borderRadius:14,border:"2px solid #e3e8f0",padding:"1.5rem",display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",boxShadow:"0 2px 10px rgba(0,0,0,.04)",transition:"border-color .2s,box-shadow .2s",height:"100%"}}>
                    <span className="badge mb-2 px-3" style={{background:"#e8f0fe",color:"var(--jm-mid)",borderRadius:20,fontSize:".82rem"}}>{p.period}</span>
                    <div className="fw-bold fs-5 mb-1" style={{color:"var(--jm-navy)"}}>{p.name}</div>
                    <div className="fw-bold my-3" style={{fontSize:"1.8rem",color:"var(--jm-blue)",lineHeight:1}}>
                      {p.price}<span style={{fontSize:".82rem",fontWeight:400,color:"#888"}}>/{p.period}</span>
                    </div>
                    <ul className="list-unstyled w-100 mb-4" style={{textAlign:"left"}}>
                      {p.features.map((f,j) => (
                        <li key={j} className="d-flex align-items-center gap-2 mb-1">
                          <i className="bi bi-check-circle-fill" style={{color:"#0d7a55",flexShrink:0,fontSize:".85rem"}} />
                          <span style={{fontSize:".87rem"}}>{f}</span>
                        </li>
                      ))}
                      {p.features.length === 0 && <li className="text-muted" style={{fontSize:".85rem"}}>Sem benefícios</li>}
                    </ul>
                    <div className="d-flex gap-2 mt-auto">
                      <button className="btn btn-sm btn-outline-primary px-3" onClick={() => startEdit(p)} title="Editar">
                        <i className="bi bi-pencil me-1" />Editar
                      </button>
                      <button className="btn btn-sm btn-outline-danger px-3" onClick={() => remove(p.id)} title="Remover">
                        <i className="bi bi-trash me-1" />Excluir
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ── Assinaturas (registros) ── */
    function AdminAssinaturas({ subscriptions, planos, usuarios }) {
      const enriched = subscriptions.map(s => ({
        ...s,
        user: usuarios.find(u => u.id === s.userId),
        plan: planos.find(p => p.id === s.planId),
      })).filter(s => s.status === "ativo");

      return (
        <div>
          <div className="adm-section-title">
            <div className="adm-section-icon"><i className="bi bi-receipt" /></div>
            <div>
              <div className="fw-bold fs-5" style={{color:"var(--jm-navy)"}}>Assinaturas</div>
              <div className="text-muted" style={{fontSize:".83rem"}}>Planos ativos dos alunos</div>
            </div>
          </div>

          <div className="adm-card">
            <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
              <i className="bi bi-list-ul me-2" style={{color:"var(--jm-blue)"}} />Lista de assinaturas
            </h6>
            {enriched.length === 0 ? (
              <p className="text-muted" style={{fontSize:".88rem"}}>Nenhuma assinatura registrada ainda.</p>
            ) : (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:".85rem"}}>
                  <thead>
                    <tr style={{borderBottom:"2px solid #eef2fb"}}>
                      {["Aluno","E-mail","Plano","Tipo","Valor","Início","Status"].map(h => (
                        <th key={h} style={{padding:".6rem .8rem",textAlign:"left",color:"var(--jm-navy)",fontWeight:700,fontSize:".78rem",textTransform:"uppercase",letterSpacing:".4px"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {enriched.map(s => (
                      <tr key={s.id} style={{borderBottom:"1px solid #eef2fb"}}>
                        <td style={{padding:".6rem .8rem",fontWeight:600,color:"var(--jm-navy)"}}>{s.user?.name || s.userName || "—"}</td>
                        <td style={{padding:".6rem .8rem",color:"#6b7a9a"}}>{s.user?.email || s.userEmail || "—"}</td>
                        <td style={{padding:".6rem .8rem"}}>{s.plan?.name || s.planName || "—"}</td>
                        <td style={{padding:".6rem .8rem"}}>
                          {(s.plan?.period || s.planPeriod) && (
                            <span className="badge rounded-pill" style={{background:"#e8f0fe",color:"var(--jm-mid)",fontSize:".72rem"}}>{s.plan?.period || s.planPeriod}</span>
                          )}
                        </td>
                        <td style={{padding:".6rem .8rem",fontWeight:600,color:"var(--jm-blue)"}}>{s.plan?.price || s.planPrice || "—"}</td>
                        <td style={{padding:".6rem .8rem",color:"#6b7a9a"}}>{s.startDate}</td>
                        <td style={{padding:".6rem .8rem"}}>
                          <span className="badge rounded-pill fw-semibold"
                            style={s.status==="ativo"?{background:"#e8f6f0",color:"#0d7a55",fontSize:".74rem"}:{background:"#fff0f0",color:"#c0392b",fontSize:".74rem"}}>
                            {s.status==="ativo" ? "● Ativa" : "● Cancelada"}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

      const stats = [
        { icon:"bi-play-circle-fill",  label:"Cursos",   value:courses.length,  color:"var(--jm-blue)", tab:"cursos"   },
        { icon:"bi-map-fill",          label:"Trilhas",  value:trilhas.length,  color:"var(--jm-mid)",  tab:"trilhas"  },
        { icon:"bi-people-fill",       label:"Alunos",   value:usuarios.length, color:"#7b2d8b",        tab:"usuarios" },

        <div>
          <div className="adm-section-title">

              <div className="fw-bold fs-5" style={{color:"var(--jm-navy)"}}>Visão Geral</div>
              <div className="text-muted" style={{fontSize:".83rem"}}>Resumo do conteúdo da plataforma</div>

          <div className="row g-3 mb-4">

                  <div style={{width:40,height:40,borderRadius:10,background:s.color+"1a",color:s.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",marginBottom:".7rem"}}>
                    <i className={"bi " + s.icon} />
                  </div>
                  <div className="fw-bold lh-1" style={{fontSize:"1.6rem",color:s.color}}>{s.value}</div>

                    <i className="bi bi-award me-1" />Com certificado

            </div>

                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Usuários ── */
    function AdminUsuarios({ usuarios, setUsuarios }) {
      const users    = usuarios;
      const setUsers = setUsuarios;
      const ativos   = users.filter(u => u.status==="ativo").length;
      const inativos = users.filter(u => u.status==="inativo").length;
      function remove(id) { if (window.confirm("Excluir este usuário?")) setUsers(prev => prev.filter(u => u.id!==id)); }
      return (
        <div>
          <div className="adm-section-title">
            <div className="adm-section-icon"><i className="bi bi-people-fill" /></div>
            <div>
              <div className="fw-bold fs-5" style={{color:"var(--jm-navy)"}}>Usuários</div>
              <div className="text-muted" style={{fontSize:".83rem"}}>Alunos registrados na plataforma</div>
            </div>
          </div>
          <div className="row g-3 mb-4">
            {[{label:"Total de alunos",value:users.length,color:"var(--jm-blue)",icon:"bi-people-fill"},
              {label:"Ativos",          value:ativos,      color:"#0d7a55",       icon:"bi-person-check-fill"},
              {label:"Inativos",        value:inativos,    color:"#c0392b",       icon:"bi-person-x-fill"}].map((s,i) => (
              <div className="col-4" key={i}>
                <div className="adm-stat-card d-flex align-items-center gap-3">
                  <div style={{width:40,height:40,borderRadius:10,background:s.color+"1a",color:s.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",flexShrink:0}}>
                    <i className={"bi " + s.icon} />
                  </div>
                  <div>
                    <div className="fw-bold lh-1" style={{fontSize:"1.4rem",color:s.color}}>{s.value}</div>
                    <div className="text-muted mt-1" style={{fontSize:".74rem"}}>{s.label}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div className="adm-card">
            <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
              <i className="bi bi-list-ul me-2" style={{color:"var(--jm-blue)"}} />Lista de alunos
            </h6>
            {users.length === 0 && (
              <p className="text-muted" style={{fontSize:".85rem"}}>
                <i className="bi bi-info-circle me-1" />Nenhum aluno cadastrado ainda.
              </p>
            )}
            {users.map(u => (
              <div className="adm-item-row" key={u.id}>
                <div style={{width:38,height:38,borderRadius:"50%",background:"rgba(26,58,143,.1)",color:"var(--jm-mid)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"1rem"}}>
                  <i className="bi bi-person-fill" />
                </div>
                <div className="flex-grow-1">
                  <div className="fw-semibold" style={{fontSize:".9rem",color:"var(--jm-navy)"}}>{u.name}</div>
                  <div className="text-muted" style={{fontSize:".77rem"}}>{u.email} · Plano: <strong>{u.plan}</strong> · Desde {u.date}</div>
                </div>
                <div className="d-flex align-items-center gap-2">
                  <span className="badge rounded-pill fw-semibold" style={u.status==="ativo"?{background:"#e8f6f0",color:"#0d7a55",fontSize:".74rem"}:{background:"#fff0f0",color:"#c0392b",fontSize:".74rem"}}>
                    {u.status==="ativo" ? "● Ativo" : "● Inativo"}
                  </span>
                  <button className="btn btn-sm btn-light text-danger" title="Excluir" onClick={() => remove(u.id)}>
                    <i className="bi bi-trash" />
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── Seção genérica (Trilhas, Módulos, Aulas) ── */
    function AdminSimple({ label, icon, sectionDesc, items, setItems }) {
      const [name, setName]         = useState("");
      const [desc, setDesc]         = useState("");
      const [editing, setEditing]   = useState(null);
      const [editName, setEditName] = useState("");
      function add(e) {
        e.preventDefault();
        if (!name.trim()) return;
        setItems(prev => [...prev, {id:uid(), name:name.trim(), description:desc.trim()}]);
        setName(""); setDesc("");
      }
      function startEdit(item) { setEditing(item.id); setEditName(item.name); }
      function confirmEdit(id) {
        if (editName.trim()) setItems(prev => prev.map(x => x.id===id ? {...x,name:editName.trim()} : x));
        setEditing(null);
      }
      function remove(id) { setItems(prev => prev.filter(x => x.id !== id)); }
      return (
        <div>
          <div className="adm-section-title">
            <div className="adm-section-icon"><i className={"bi " + icon} /></div>
            <div>
              <div className="fw-bold fs-5" style={{color:"var(--jm-navy)"}}>{label}s</div>
              <div className="text-muted" style={{fontSize:".83rem"}}>{sectionDesc}</div>
            </div>
          </div>
          <div className="row g-4">
            <div className="col-12 col-lg-5">
              <div className="adm-card">
                <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
                  <i className="bi bi-plus-circle me-2" style={{color:"var(--jm-blue)"}} />Adicionar {label}
                </h6>
                <form onSubmit={add}>
                  <div className="mb-3">
                    <label className="jm-label">Nome</label>
                    <input className="adm-input" placeholder={"Nome " + label.toLowerCase()} value={name} onChange={e => setName(e.target.value)} required />
                  </div>
                  <div className="mb-4">
                    <label className="jm-label">Descrição (opcional)</label>
                    <textarea className="adm-textarea" placeholder="Descrição..." value={desc} onChange={e => setDesc(e.target.value)} style={{minHeight:60}} />
                  </div>
                  <button type="submit" className="adm-btn-primary w-100"><i className="bi bi-plus-lg me-1" />Adicionar</button>
                </form>
              </div>
            </div>
            <div className="col-12 col-lg-7">
              <div className="adm-card">
                <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
                  <i className="bi bi-list-ul me-2" style={{color:"var(--jm-blue)"}} />
                  {label}s cadastrados <span className="badge ms-1 rounded-pill" style={{background:"#e8f0fe",color:"var(--jm-mid)",fontSize:".73rem"}}>{items.length}</span>
                </h6>
                {items.length === 0 && <p className="text-muted" style={{fontSize:".87rem"}}>Nenhum item ainda.</p>}
                {items.map(item => (
                  <div className="adm-item-row" key={item.id}>
                    {editing === item.id ? (
                      <>
                        <input className="adm-input flex-grow-1" value={editName} onChange={e => setEditName(e.target.value)}
                          onKeyDown={e => { if(e.key==="Enter") confirmEdit(item.id); if(e.key==="Escape") setEditing(null); }} autoFocus />
                        <button className="btn btn-sm btn-primary" onClick={() => confirmEdit(item.id)}><i className="bi bi-check-lg" /></button>
                        <button className="btn btn-sm btn-light" onClick={() => setEditing(null)}><i className="bi bi-x-lg" /></button>
                      </>
                    ) : (
                      <>
                        <div className="flex-grow-1">
                          <div className="fw-semibold" style={{fontSize:".9rem",color:"var(--jm-navy)"}}>{item.name}</div>
                          {item.description && <div className="text-muted" style={{fontSize:".77rem"}}>{item.description}</div>}
                        </div>
                        <button className="btn btn-sm btn-light" onClick={() => startEdit(item)} title="Editar"><i className="bi bi-pencil" /></button>
                        <button className="btn btn-sm btn-light text-danger" onClick={() => remove(item.id)} title="Remover"><i className="bi bi-trash" /></button>
                      </>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Trilhas ── */
    const LEVELS   = ["Iniciante","Intermediário","Avançado"];
    const AREAS    = ["Programação","Design","Dados","Marketing","Negócios","DevOps","Mobile","Outro"];

    function AdminTrilhas({ trilhas, setTrilhas, courses }) {
      const empty = { name:"", description:"", level:"Iniciante", area:"", goal:"", courseIds:[] };
      const [form, setForm]       = useState(empty);
      const [editing, setEditing] = useState(null);

      function totalHours(ids) {
        return ids.reduce((sum,id) => {
          const c = courses.find(x => x.id===id);
          const h = c ? parseInt(c.workload) : 0;
          return sum + (isNaN(h) ? 0 : h);
        }, 0);
      }
      function toggleCourse(id) {
        setForm(f => ({ ...f, courseIds: f.courseIds.includes(id) ? f.courseIds.filter(x=>x!==id) : [...f.courseIds,id] }));
      }
      function save(e) {
        e.preventDefault();
        if (!form.name.trim()) return;
        if (editing !== null) {
          setTrilhas(prev => prev.map(t => t.id===editing ? {...form,id:editing} : t));
          setEditing(null);
        } else {
          setTrilhas(prev => [...prev, {...form, id:uid()}]);
        }
        setForm(empty);
      }
      function startEdit(t) { setForm({name:t.name,description:t.description,level:t.level,area:t.area,goal:t.goal||"",courseIds:t.courseIds||[]}); setEditing(t.id); }
      function remove(id)   { setTrilhas(prev => prev.filter(t => t.id!==id)); }
      function cancel()     { setForm(empty); setEditing(null); }

      const levelColor = { "Iniciante":"#0d7a55", "Intermediário":"#c07000", "Avançado":"#c0392b" };
      const levelBg    = { "Iniciante":"#e8f6f0", "Intermediário":"#fff8e6", "Avançado":"#fff0f0" };

      return (
        <div>
          <div className="adm-section-title">
            <div className="adm-section-icon"><i className="bi bi-map-fill" /></div>
            <div>
              <div className="fw-bold fs-5" style={{color:"var(--jm-navy)"}}>Trilhas de Aprendizado</div>
              <div className="text-muted" style={{fontSize:".83rem"}}>Sequências estruturadas de cursos por tema ou tecnologia</div>
            </div>
          </div>

          <div className="row g-4">
            <div className="col-12 col-lg-5">
              <div className="adm-card">
                <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
                  <i className={"bi bi-" + (editing!==null?"pencil":"plus-circle") + " me-2"} style={{color:"var(--jm-blue)"}} />
                  {editing!==null ? "Editar trilha" : "Nova trilha"}
                </h6>
                <form onSubmit={save}>
                  <div className="mb-3">
                    <label className="jm-label">Nome da trilha</label>
                    <input className="adm-input" placeholder="Ex: Trilha de Desenvolvimento Web"
                      value={form.name} onChange={e => setForm({...form,name:e.target.value})} required />
                  </div>
                  <div className="row g-2 mb-3">
                    <div className="col-6">
                      <label className="jm-label">Nível</label>
                      <select className="adm-input" value={form.level} onChange={e => setForm({...form,level:e.target.value})}>
                        {LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
                      </select>
                    </div>
                    <div className="col-6">
                      <label className="jm-label">Área</label>
                      <select className="adm-input" value={form.area} onChange={e => setForm({...form,area:e.target.value})}>
                        <option value="">Selecionar...</option>
                        {AREAS.map(a => <option key={a} value={a}>{a}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="mb-3">
                    <label className="jm-label">Descrição</label>
                    <textarea className="adm-textarea" placeholder="Descreva o objetivo da trilha..." style={{minHeight:64}}
                      value={form.description} onChange={e => setForm({...form,description:e.target.value})} />
                  </div>
                  <div className="mb-3">
                    <label className="jm-label">O que você vai aprender</label>
                    <textarea className="adm-textarea" placeholder="Liste as competências que o aluno desenvolverá..." style={{minHeight:56}}
                      value={form.goal} onChange={e => setForm({...form,goal:e.target.value})} />
                  </div>
                  <div className="mb-4">
                    <label className="jm-label">Cursos da trilha</label>
                    {courses.length === 0
                      ? <p className="text-muted mb-0" style={{fontSize:".83rem"}}>Nenhum curso cadastrado ainda.</p>
                      : courses.map(c => (
                        <label key={c.id} className="d-flex align-items-center gap-2 mb-1 p-2 rounded-2"
                          style={{cursor:"pointer",background:form.courseIds.includes(c.id)?"#f0f4ff":"transparent",border:"1px solid",borderColor:form.courseIds.includes(c.id)?"#c5d8fa":"transparent",transition:"all .15s"}}>
                          <input type="checkbox" checked={form.courseIds.includes(c.id)} onChange={() => toggleCourse(c.id)} />
                          <span style={{fontSize:".87rem",flex:1}}>{c.name}</span>
                          {c.workload && <span className="text-muted" style={{fontSize:".75rem"}}>{c.workload}</span>}
                        </label>
                      ))
                    }
                    {form.courseIds.length > 0 && (
                      <div className="mt-2 text-muted" style={{fontSize:".78rem"}}>
                        <i className="bi bi-clock me-1" />Total: {totalHours(form.courseIds)} horas · {form.courseIds.length} curso(s)
                      </div>
                    )}
                  </div>
                  <div className="d-flex gap-2">
                    <button type="submit" className="adm-btn-primary flex-grow-1">
                      <i className={"bi bi-" + (editing!==null?"check-lg":"plus-lg") + " me-1"} />
                      {editing!==null ? "Salvar" : "Criar trilha"}
                    </button>
                    {editing!==null && <button type="button" className="btn btn-light btn-sm px-3" onClick={cancel}>Cancelar</button>}
                  </div>
                </form>
              </div>
            </div>

            <div className="col-12 col-lg-7">
              <div className="adm-card">
                <h6 className="fw-bold mb-3" style={{color:"var(--jm-navy)"}}>
                  <i className="bi bi-list-ul me-2" style={{color:"var(--jm-blue)"}} />
                  Trilhas cadastradas <span className="badge ms-1 rounded-pill" style={{background:"#e8f0fe",color:"var(--jm-mid)",fontSize:".73rem"}}>{trilhas.length}</span>
                </h6>
                {trilhas.length === 0 && <p className="text-muted" style={{fontSize:".87rem"}}>Nenhuma trilha ainda.</p>}
                {trilhas.map(t => (
                  <div className="adm-item-row" key={t.id} style={{flexDirection:"column",alignItems:"stretch"}}>
                    <div className="d-flex align-items-center gap-2">
                      <div className="flex-grow-1">
                        <div className="fw-bold" style={{color:"var(--jm-navy)",fontSize:".92rem"}}>{t.name}</div>
                        <div className="d-flex flex-wrap gap-1 mt-1">
                          {t.level && <span className="badge rounded-pill" style={{background:levelBg[t.level],color:levelColor[t.level],fontSize:".71rem"}}>{t.level}</span>}
                          {t.area  && <span className="badge rounded-pill" style={{background:"#f0f4ff",color:"var(--jm-mid)",fontSize:".71rem"}}>{t.area}</span>}
                          {t.courseIds?.length > 0 && <span className="badge rounded-pill" style={{background:"#e8f6f0",color:"#0d7a55",fontSize:".71rem"}}><i className="bi bi-play-circle me-1"/>{t.courseIds.length} curso(s)</span>}
                          {totalHours(t.courseIds||[]) > 0 && <span className="badge rounded-pill" style={{background:"#fff8e6",color:"#c07000",fontSize:".71rem"}}><i className="bi bi-clock me-1"/>{totalHours(t.courseIds||[])}h</span>}
                        </div>
                      </div>
                      <div className="d-flex gap-1 flex-shrink-0">
                        <button className="btn btn-sm btn-light" onClick={() => startEdit(t)} title="Editar"><i className="bi bi-pencil" /></button>
                        <button className="btn btn-sm btn-light text-danger" onClick={() => remove(t.id)} title="Remover"><i className="bi bi-trash" /></button>
                      </div>
                    </div>
                    {t.description && <div className="text-muted mt-1" style={{fontSize:".78rem"}}>{t.description}</div>}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Painel Admin (tela separada) ── */
    function AdminPanel({ courses, setCourses, planos, setPlanos, trilhas, setTrilhas,
                          usuarios, setUsuarios, subscriptions,
                          onLogout }) {
      const [activeTab, setActiveTab] = useState("visao-geral");

      return (
        <div style={{minHeight:"100vh",background:"#f4f6fb"}}>
          {/* Navbar */}
          <div className="adm-nav">
            <div className="d-flex align-items-center gap-3">
              <div style={{width:52,height:52,borderRadius:13,background:"rgba(255,255,255,.15)",border:"2px solid rgba(255,255,255,.22)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <i className="bi bi-mortarboard-fill" style={{fontSize:"1.65rem",color:"#fff"}} />
              </div>
              <div>
                <div style={{fontWeight:900,fontSize:"1.4rem",letterSpacing:"-1px",color:"#fff",lineHeight:1.1}}>
                  JM <span style={{color:"rgba(255,255,255,.45)"}}>Cursos</span>
                </div>
                <div style={{fontSize:".68rem",color:"rgba(255,255,255,.55)",letterSpacing:"1.8px",textTransform:"uppercase",marginTop:"3px"}}>
                  Painel Administrativo
                </div>
              </div>
            </div>
            <div className="d-flex align-items-center gap-2">
              <div className="d-none d-md-flex align-items-center gap-2 px-3 py-2 rounded-3 me-1"
                style={{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)"}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <i className="bi bi-person-fill" style={{color:"#fff",fontSize:".9rem"}} />
                </div>
                <div>
                  <div style={{fontSize:".82rem",fontWeight:700,color:"#fff",lineHeight:1.1}}>Administrador</div>
                  <div style={{fontSize:".68rem",color:"rgba(255,255,255,.6)"}}>admin@gmail.com</div>
                </div>
              </div>
              <button style={{background:"rgba(255,255,255,.13)",color:"#fff",border:"1px solid rgba(255,255,255,.22)",borderRadius:9,padding:".5rem 1rem",fontWeight:600,cursor:"pointer",fontSize:".85rem",fontFamily:"inherit"}}
                onClick={onLogout}>
                <i className="bi bi-box-arrow-left me-2" />Sair
              </button>
            </div>
          </div>

          {/* Tabs */}
          <div className="adm-tabs">
            {ADMIN_TABS.map(t => (
              <button key={t.key} className={"adm-tab" + (activeTab===t.key?" active":"")} onClick={() => setActiveTab(t.key)}>
                <i className={"bi " + t.icon + " me-2"} />{t.label}
              </button>
            ))}
          </div>

          {/* Conteúdo */}
          <div className="p-4" style={{maxWidth:1100,margin:"0 auto"}}>
            {activeTab==="visao-geral" && <AdminOverview courses={courses} planos={planos} trilhas={trilhas} usuarios={usuarios} onTabChange={setActiveTab} />}
            {activeTab==="cursos"      && <AdminCursos courses={courses} setCourses={setCourses} />}
            {activeTab==="planos"      && <AdminPlanos planos={planos} setPlanos={setPlanos} />}
            {activeTab==="assinaturas" && <AdminAssinaturas subscriptions={subscriptions} planos={planos} usuarios={usuarios} />}
            {activeTab==="trilhas"     && <AdminTrilhas trilhas={trilhas} setTrilhas={setTrilhas} courses={courses} />}
            {activeTab==="usuarios"    && <AdminUsuarios usuarios={usuarios} setUsuarios={setUsuarios} />}
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════
       JM CURSOS — conteúdo por aba
    ════════════════════════════════════════ */
    const CERT_DATE = new Date().toLocaleDateString("pt-BR");
    function certCode(id) { return "JM-" + new Date().getFullYear() + "-" + String(id).slice(-5).toUpperCase().padStart(5,"0"); }

    function CertificadoCard({ course, studentName, isTrilha, trailCourseCount }) {
      const [open, setOpen] = useState(false);
      const iconBg    = isTrilha ? "#e8f6f0"      : "#e8f0fe";
      const iconColor = isTrilha ? "#0d7a55"       : "var(--jm-blue)";
      const icon      = isTrilha ? "bi-map-fill"  : "bi-award-fill";
      const certLabel = isTrilha ? "Trilha: " + course.name : course.name;
      const certSub   = isTrilha
        ? <><i className="bi bi-map me-1"/>{trailCourseCount} curso(s) · Trilha concluída em {CERT_DATE}</>
        : <>{course.workload && <><i className="bi bi-clock me-1"/>{course.workload} · </>}Concluído em {CERT_DATE}</>;
      return (
        <div className="mb-3">
          <div className="adm-item-row" style={{background:"#fff"}}>
            <div style={{width:40,height:40,borderRadius:10,background:iconBg,color:iconColor,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"1.2rem"}}>
              <i className={"bi " + icon} />
            </div>
            <div className="flex-grow-1">
              <div className="d-flex align-items-center gap-2 flex-wrap">
                <span className="fw-bold" style={{color:"var(--jm-navy)",fontSize:".93rem"}}>{certLabel}</span>
                {isTrilha && <span className="badge rounded-pill" style={{background:"#e8f6f0",color:"#0d7a55",fontSize:".7rem"}}>Trilha</span>}
              </div>
              <div className="text-muted" style={{fontSize:".77rem"}}>{certSub}</div>
            </div>
            <button className="btn btn-sm fw-semibold"
              style={{background:open?"#f0f4ff":"var(--jm-grad)",color:open?"var(--jm-mid)":"#fff",border:open?"1px solid #d0dcf5":"none",borderRadius:8,fontSize:".82rem"}}
              onClick={() => setOpen(!open)}>
              <i className={"bi bi-" + (open?"chevron-up":"award") + " me-1"} />{open ? "Fechar" : "Ver certificado"}
            </button>
          </div>
          {open && (
            <div className="mt-2 mb-1 cert-wrap">
              <div className="cert-inner">
                <div className="cert-corner tl"/><div className="cert-corner tr"/>
                <div className="cert-corner bl"/><div className="cert-corner br"/>
                <div className="d-flex align-items-center justify-content-center gap-2 mb-3">
                  <i className="bi bi-mortarboard-fill" style={{fontSize:"2rem",color:"var(--jm-navy)"}} />
                  <span style={{fontWeight:900,fontSize:"1.3rem",color:"var(--jm-navy)",letterSpacing:"-1px"}}>JM <span style={{color:"var(--jm-blue)"}}>Cursos</span></span>
                </div>
                <div className="cert-title">Certificado de Conclusão</div>
                <div className="cert-divider" />
                <p className="text-muted mb-2" style={{fontSize:".88rem"}}>Certificamos que</p>
                <div className="cert-student mb-3">{studentName || "Aluno"}</div>
                <p className="mb-1" style={{fontSize:".92rem",color:"#555"}}>
                  {isTrilha ? "concluiu com êxito a trilha de aprendizado" : "concluiu com êxito o curso"}
                </p>
                <div className="cert-course mb-1">{course.name}</div>
                {isTrilha
                  ? <p className="text-muted mb-3" style={{fontSize:".85rem"}}>{trailCourseCount} curso(s) concluído(s)</p>
                  : course.workload && <p className="text-muted mb-3" style={{fontSize:".85rem"}}>com carga horária de <strong>{course.workload}</strong></p>
                }
                <div className="cert-divider" />
                <div className="d-flex justify-content-center gap-5 mt-3">
                  <div>
                    <div className="cert-sig-line" />
                    <div style={{fontSize:".78rem",color:"#555"}}>Data de conclusão</div>
                    <div style={{fontSize:".85rem",fontWeight:600,color:"var(--jm-navy)"}}>{CERT_DATE}</div>
                  </div>
                  <div>
                    <div className="cert-sig-line" />
                    <div style={{fontSize:".78rem",color:"#555"}}>Código do certificado</div>
                    <div style={{fontSize:".8rem",fontWeight:600,color:"var(--jm-mid)",fontFamily:"monospace"}}>{certCode(isTrilha ? "T"+course.id : course.id)}</div>

                </div>
                <div className="mt-4 pt-3" style={{borderTop:"1px dashed #d0dcf5"}}>
                  <div className="cert-sig-line" style={{width:180}} />
                  <div style={{fontSize:".82rem",fontWeight:700,color:"var(--jm-navy)"}}>Diretor(a) — JM Cursos</div>

            </div>

        </div>

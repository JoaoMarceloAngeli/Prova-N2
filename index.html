<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev.JM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    const subPages = [
      "Trilhas", "Cursos", "Módulos", "Aulas",
      "Usuários", "Assinaturas", "Certificados"
    ];

    function App() {
      const [page, setPage] = useState("home");
      const [sub, setSub] = useState("Trilhas");

      return (
        <div>
          <nav className="navbar bg-white border-bottom shadow-sm px-4 py-2">
            <span className="fw-bold fs-5 me-4">SG Cursos</span>
            <button
              className={"btn btn-link text-decoration-none p-0 me-3 " + (page === "home" ? "fw-bold text-dark" : "text-primary")}
              onClick={() => setPage("home")}
            >Home</button>
            <button
              className={"btn btn-link text-decoration-none p-0 " + (page === "sgcursos" ? "fw-bold text-dark" : "text-primary")}
              onClick={() => setPage("sgcursos")}
            >SG Cursos</button>
          </nav>

          {page === "home" && (
            <div className="text-center py-5 mt-5">
              <h2 className="fw-bold">Bem-vindo ao Dev.JM</h2>
            </div>
          )}

          {page === "sgcursos" && (
            <div className="d-flex" style={{minHeight: "calc(100vh - 56px)"}}>
              <div className="bg-white border-end p-3" style={{width: 200, minWidth: 200}}>
                <ul className="nav flex-column gap-1">
                  {subPages.map(s => (
                    <li className="nav-item" key={s}>
                      <button
                        className={"btn btn-link text-decoration-none text-start w-100 px-3 py-2 rounded " +
                          (sub === s ? "fw-bold text-dark bg-light" : "text-secondary")}
                        onClick={() => setSub(s)}
                      >{s}</button>
                    </li>
                  ))}
                </ul>
              </div>
              <div className="p-5">
                <h3 className="fw-semibold">{sub}</h3>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
